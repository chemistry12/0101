<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chemy</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ── 라이트 모드 변수 ── */
:root {
  --bg:        #f4f6f9;
  --bg2:       #eef0f4;
  --white:     #ffffff;
  --card:      #ffffff;
  --border:    #e8ebed;
  --border2:   #d1d5db;
  --text:      #0f172a;
  --text2:     #64748b;
  --text3:     #94a3b8;
  --blue:      #2563eb;
  --blue-dk:   #1d4ed8;
  --blue-bg:   #eff6ff;
  --blue-lt:   #dbeafe;
  --green:     #059669;
  --green-bg:  #ecfdf5;
  --amber:     #d97706;
  --amber-bg:  #fffbeb;
  --purple:    #7c3aed;
  --purple-bg: #f5f3ff;
  --red:       #dc2626;
  --red-bg:    #fef2f2;
  --hdr-bg:    #ffffff;
  --hdr-border:#e8ebed;
  --r:   14px;
  --rsm: 8px;
  --shadow:    0 1px 2px rgba(15,23,42,.04), 0 2px 8px rgba(15,23,42,.06);
  --shadow-md: 0 4px 16px rgba(15,23,42,.08), 0 1px 4px rgba(15,23,42,.04);
  --shadow-lg: 0 16px 48px rgba(15,23,42,.14), 0 4px 12px rgba(15,23,42,.06);
}

/* ── 다크 모드 변수 ── */
html.dark {
  --bg:        #0f1117;
  --bg2:       #161b22;
  --white:     #1c2128;
  --card:      #1c2128;
  --border:    #30363d;
  --border2:   #3d4550;
  --text:      #e6edf3;
  --text2:     #8b949e;
  --text3:     #6e7681;
  --blue:      #58a6ff;
  --blue-dk:   #79b8ff;
  --blue-bg:   #0d1f38;
  --blue-lt:   #1b3a5c;
  --green:     #3fb950;
  --green-bg:  #0d2c1a;
  --amber:     #e3b341;
  --amber-bg:  #2d1f00;
  --purple:    #bc8cff;
  --purple-bg: #1d1038;
  --red:       #f85149;
  --red-bg:    #2d1117;
  --hdr-bg:    #161b22;
  --hdr-border:#30363d;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Noto Sans KR', sans-serif;
  background: var(--bg);
  color: var(--text);
  font-size: 13px;
  line-height: 1.5;
  min-height: 100vh;
  transition: background .25s, color .25s;
}

/* ══ HEADER ══ */
.hdr {
  background: var(--hdr-bg);
  border-bottom: 1px solid var(--hdr-border);
  padding: 0 28px;
  height: 56px;
  display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 200;
  box-shadow: 0 1px 0 var(--hdr-border);
  transition: background .25s, border-color .25s;
}
.logo {
  font-family: 'DM Mono', monospace;
  font-size: 17px; font-weight: 500;
  color: var(--blue); letter-spacing: .06em;
}
.hdr-center { display: flex; align-items: center; gap: 10px; }
.clock {
  font-family: 'DM Mono', monospace;
  font-size: 20px; font-weight: 500;
  color: var(--text); letter-spacing: .04em;
  transition: color .25s;
}
.date-pill {
  font-size: 11.5px; font-family: 'DM Mono', monospace;
  color: var(--text2);
  background: var(--bg);
  padding: 3px 12px; border-radius: 20px;
  border: 1px solid var(--border);
  transition: background .25s, border-color .25s, color .25s;
}
.hdr-right { display: flex; align-items: center; gap: 8px; }

/* 다크모드 토글 */
.dark-toggle {
  width: 36px; height: 20px; border-radius: 20px;
  background: var(--border2); border: none; cursor: pointer;
  position: relative; transition: background .25s; flex-shrink: 0;
  padding: 0;
}
.dark-toggle::after {
  content: ''; position: absolute;
  width: 14px; height: 14px; border-radius: 50%;
  background: #fff; top: 3px; left: 3px;
  transition: transform .22s cubic-bezier(.4,0,.2,1), background .25s;
  box-shadow: 0 1px 3px rgba(0,0,0,.2);
}
html.dark .dark-toggle { background: var(--blue); }
html.dark .dark-toggle::after { transform: translateX(16px); background: #fff; }
.dark-toggle-wrap {
  display: flex; align-items: center; gap: 7px;
  font-size: 11.5px; color: var(--text3); cursor: pointer;
}
.dark-toggle-icon { font-size: 14px; }

.sync-pill {
  font-size: 11px; font-weight: 600;
  padding: 4px 12px; border-radius: 20px;
  display: inline-flex; align-items: center; gap: 5px;
  border: 1px solid var(--border2);
  background: var(--white);
  color: var(--text2);
  transition: all .2s;
}
.sync-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--text3); flex-shrink:0; }
.sync-pill.synced  .sync-dot { background: var(--green); }
.sync-pill.synced  { border-color: #abefc6; color: var(--green); background: var(--green-bg); }
.sync-pill.syncing .sync-dot { background: var(--amber); animation: pulse 1s infinite; }
.sync-pill.syncing { border-color: #fedf89; color: var(--amber); background: var(--amber-bg); }
.sync-pill.error   .sync-dot { background: var(--red); }
.sync-pill.error   { border-color: #fca5a5; color: var(--red); background: var(--red-bg); }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

.hdr-btn {
  font-size: 12px; font-weight: 500; font-family: inherit;
  padding: 6px 14px; border-radius: var(--rsm);
  border: 1px solid var(--border2);
  background: var(--white);
  color: var(--text2); cursor: pointer; transition: all .15s;
}
.hdr-btn:hover { background: var(--blue); color: #fff; border-color: var(--blue); }

/* ══ LAYOUT ══ */
.wrap { padding: 20px 24px; display: flex; flex-direction: column; gap: 16px; max-width: 1480px; margin: 0 auto; }
.top-row {
  display: grid;
  grid-template-columns: 256px 1fr 1fr;
  gap: 16px;
  align-items: stretch;
}
.bot-row {
  display: grid;
  grid-template-columns: 300px 1fr 1fr 1fr;
  gap: 16px;
  align-items: start;
}

@media (max-width: 1100px) {
  .bot-row { grid-template-columns: 1fr 1fr 1fr; }
  .todo-card { grid-column: 1 / -1; }
}
@media (max-width: 900px) {
  .top-row { grid-template-columns: 1fr; }
  .bot-row { grid-template-columns: 1fr; }
  .wrap { padding: 12px 14px; }
  .hdr { padding: 0 14px; height: auto; flex-wrap: wrap; gap: 6px; padding: 10px 14px; }
  .hdr-center { order: 3; width: 100%; justify-content: center; padding-bottom: 4px; }
  .clock { font-size: 16px; }
  .sync-pill span:not(.sync-dot) { display: none; }
  .sync-pill { padding: 4px 8px; }
}

/* ══ CARD ══ */
.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--r);
  box-shadow: var(--shadow);
  padding: 18px 20px;
  display: flex; flex-direction: column; gap: 14px;
  transition: background .25s, border-color .25s;
}
.card-title {
  font-size: 10.5px; font-weight: 700;
  letter-spacing: .08em; text-transform: uppercase;
  color: var(--text3);
  display: flex; align-items: center; justify-content: space-between;
}
.card-title-left { display: flex; align-items: center; gap: 7px; }
.card-title-icon { font-size: 13px; }

/* ══ CALENDAR ══ */
.cal-nav-row { display: flex; align-items: center; justify-content: space-between; }
.cal-month { font-size: 15px; font-weight: 700; letter-spacing: -.02em; color: var(--text); }
.cal-nav { display: flex; gap: 3px; }
.cal-nav button {
  width: 26px; height: 26px;
  border: 1px solid var(--border); border-radius: var(--rsm);
  background: var(--card); cursor: pointer; font-size: 13px; color: var(--text2);
  display: flex; align-items: center; justify-content: center; transition: all .15s;
}
.cal-nav button:hover { background: var(--blue); color: #fff; border-color: var(--blue); }
.cal-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 2px; }
.cal-dow {
  text-align: center; font-size: 10px; font-weight: 700;
  color: var(--text3); padding: 4px 0 7px; letter-spacing: .04em;
}
.cal-dow:first-child { color: #f87171; }
.cal-dow:last-child  { color: var(--blue); }
.cal-day {
  text-align: center; font-size: 12px;
  padding: 6px 2px; border-radius: 8px;
  cursor: pointer; transition: background .1s, color .1s;
  position: relative; line-height: 1; font-weight: 400;
}
.cal-day:hover { background: var(--blue-bg); }
.cal-day.other  { color: var(--text3); }
.cal-day.today  {
  background: var(--blue); color: #fff; font-weight: 700;
  box-shadow: 0 2px 10px rgba(37,99,235,.4);
}
.cal-day.sun    { color: #f87171; }
.cal-day.sat    { color: var(--blue); }
.cal-day.today.sun, .cal-day.today.sat { color: #fff; }

/* 달력 이벤트 dot */
.cal-day { flex-direction: column; gap: 1px; display: flex; align-items: center; justify-content: center; }
.cal-day-num { line-height: 1; }
.cal-dots { display: flex; gap: 2px; align-items: center; justify-content: center; min-height: 5px; }
.cal-dot {
  width: 4px; height: 4px; border-radius: 50%; flex-shrink: 0;
}
.cal-dot.g3     { background: #2563eb; }
.cal-dot.school { background: #94a3b8; }

/* 달력 일정 툴팁 */
.cal-tooltip {
  position: absolute; z-index: 300;
  background: var(--card); border: 1px solid var(--border2);
  border-radius: 10px; box-shadow: var(--shadow-md);
  padding: 10px 13px; min-width: 160px; max-width: 220px;
  font-size: 11.5px; line-height: 1.6;
  pointer-events: none;
  animation: ttIn .15s ease;
}
@keyframes ttIn { from { opacity:0; transform:translateY(4px); } to { opacity:1; transform:none; } }
.cal-tooltip-date { font-size: 10.5px; font-weight: 700; color: var(--text3); margin-bottom: 5px; letter-spacing: .04em; }
.cal-tooltip-row { display: flex; align-items: flex-start; gap: 6px; }
.cal-tooltip-dot { width: 6px; height: 6px; border-radius: 50%; margin-top: 4px; flex-shrink: 0; }
.cal-tooltip-txt { color: var(--text); word-break: keep-all; }
.cal-tooltip-g3   .cal-tooltip-dot { background: #2563eb; }
.cal-tooltip-sch  .cal-tooltip-dot { background: #94a3b8; }

/* 달력 카드 relative for tooltip */
#cal-card { position: relative; overflow: visible; }

/* ══ TIMETABLE ══ */
.tt-wrap { overflow: hidden; }
.tt { width: 100%; border-collapse: collapse; font-size: 10px; table-layout: fixed; }
.tt th {
  padding: 5px 2px; text-align: center;
  font-size: 9px; font-weight: 700; letter-spacing: .05em; color: var(--text3);
  border-bottom: 1.5px solid var(--border);
}
.tt th.th-today { color: var(--blue); font-weight: 800; }
.tt td { padding: 1.5px 1px; border-bottom: 1px solid var(--border); vertical-align: middle; }
.tt td.p-col {
  font-family: 'DM Mono', monospace;
  color: var(--text3); width: 28px; text-align: center;
  padding: 2px; line-height: 1; font-size: 9px;
}
html.dark .tt td.t-col { background: rgba(37,99,235,.08); }
.tt td.t-col { background: #f0f6ff; }
.tt-cell {
  min-height: 24px; padding: 3px 3px; border-radius: 5px;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  cursor: pointer; transition: opacity .12s, transform .1s;
}
.tt-cell:hover { opacity: .8; transform: scale(.96); }
.tt-cell.empty { background: transparent; min-height: 24px; }
.tt-cell.empty:hover { background: var(--bg2); }
.tt-cell-name { font-size: 10px; font-weight: 700; text-align: center; line-height: 1.2; }
.tt-cell-sub  { font-size: 7.5px; text-align: center; line-height: 1.2; opacity: .7; margin-top: 1px; }
.tt-badge {
  font-size: 10px; font-weight: 600; padding: 2px 10px; border-radius: 20px;
}
.tt-badge-0 { background: #fef9c3; color: #854d0e; }
.tt-badge-1 { background: var(--green-bg); color: var(--green); }
html.dark .tt-badge-0 { background: #3b2a00; color: #fde68a; }
html.dark .tt-badge-1 { background: var(--green-bg); color: var(--green); }

/* ══ LINK SECTION (그리드 버튼형) ══ */
.link-section-header {
  display: flex; align-items: center; justify-content: space-between; gap: 8px;
}
.link-section-title-wrap {
  display: flex; align-items: center; gap: 6px; flex: 1;
}
.link-icon { font-size: 15px; }
.link-section-title {
  font-size: 15px; font-weight: 700; color: var(--text);
  border: none; background: transparent; outline: none;
  font-family: inherit; cursor: text; padding: 2px 5px;
  border-radius: 5px; min-width: 50px; max-width: 180px;
  transition: background .12s;
}
.link-section-title:hover { background: var(--bg); }
.link-section-title:focus { background: var(--blue-bg); color: var(--blue); }
.link-edit-toggle {
  font-size: 11px; font-weight: 500; color: var(--text3);
  border: 1px solid var(--border2); background: var(--white);
  padding: 4px 10px; border-radius: 20px; cursor: pointer;
  font-family: inherit; transition: all .15s; display: flex; align-items: center; gap: 4px;
  white-space: nowrap;
}
.link-edit-toggle:hover { border-color: var(--blue); color: var(--blue); background: var(--blue-bg); }
.link-edit-toggle.active { border-color: var(--green); color: var(--green); background: var(--green-bg); }

/* 그리드 컨테이너 */
.link-btn-grid {
  display: grid; grid-template-columns: 1fr 1fr; gap: 7px;
}

/* 링크 아이템 래퍼 (버튼 + 수정/삭제를 감싸는 컨테이너) */
.link-item {
  display: flex; flex-direction: column; gap: 3px;
}

/* 메인 링크 버튼 */
.link-btn {
  padding: 11px 10px;
  border-radius: 10px;
  border: 1.5px solid transparent;
  font-size: 12.5px; font-weight: 600;
  font-family: inherit; cursor: pointer;
  text-align: center; line-height: 1.4;
  transition: all .15s; word-break: keep-all;
  overflow: hidden;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  white-space: normal;
  width: 100%;
}
.link-btn:hover { filter: brightness(.93); transform: translateY(-1px); box-shadow: 0 3px 10px rgba(0,0,0,.1); }
.link-btn:active { transform: translateY(0); }

/* 수정/삭제 버튼 행 — 수정 모드일 때만 표시 */
.link-item-actions {
  display: none;
  gap: 3px;
}
.edit-mode .link-item-actions { display: flex; }
.link-item-act {
  flex: 1; padding: 4px 0; border-radius: 6px;
  font-size: 11px; font-weight: 600; font-family: inherit;
  cursor: pointer; border: 1px solid var(--border2);
  text-align: center; transition: all .12s;
  background: var(--white); color: var(--text2);
}
.link-item-act:hover { background: var(--blue-bg); color: var(--blue); border-color: var(--blue-lt); }
.link-item-act.del:hover { background: var(--red-bg); color: var(--red); border-color: #fecaca; }

/* 색상 프리셋 */
.lc-gray   { background: #f2f4f7; color: #344054; border-color: #e4e7ec; }
.lc-blue   { background: #e8f0fe; color: #1a56db; border-color: #bfdbfe; }
.lc-green  { background: #dcfce7; color: #166534; border-color: #bbf7d0; }
.lc-yellow { background: #fef9c3; color: #713f12; border-color: #fde68a; }
.lc-purple { background: #f3e8ff; color: #6b21a8; border-color: #e9d5ff; }
.lc-red    { background: #fee2e2; color: #991b1b; border-color: #fecaca; }
.lc-teal   { background: #ccfbf1; color: #134e4a; border-color: #99f6e4; }
.lc-orange { background: #ffedd5; color: #7c2d12; border-color: #fed7aa; }

/* 추가 버튼 */
.link-add-btn {
  padding: 11px 10px; border-radius: 10px;
  border: 2px dashed var(--border2); background: transparent;
  font-size: 12px; font-weight: 500; color: var(--text3);
  font-family: inherit; cursor: pointer; transition: all .15s;
  display: flex; align-items: center; justify-content: center;
}
.link-add-btn:hover { border-color: var(--blue); color: var(--blue); background: var(--blue-bg); }

.empty-msg { font-size: 12px; color: var(--text3); text-align: center; padding: 16px 0; }

/* 다크모드 링크 버튼 색상 오버라이드 */
html.dark .lc-gray   { background: #21262d; color: #adbac7; border-color: #30363d; }
html.dark .lc-blue   { background: #0d1f38; color: #79b8ff; border-color: #1b3a5c; }
html.dark .lc-green  { background: #0d2c1a; color: #56d364; border-color: #1b4a2a; }
html.dark .lc-yellow { background: #2d1f00; color: #e3b341; border-color: #4a3200; }
html.dark .lc-purple { background: #1d1038; color: #d2a8ff; border-color: #3b1f6b; }
html.dark .lc-red    { background: #2d1117; color: #ff7b72; border-color: #5c1f24; }
html.dark .lc-teal   { background: #0a2a26; color: #39d8c8; border-color: #1a4a44; }
html.dark .lc-orange { background: #2d1700; color: #ffa657; border-color: #4a2800; }

/* ══ TODO ══ */
.todo-input-row { display: flex; gap: 6px; align-items: stretch; }
.todo-input {
  flex: 1; padding: 9px 13px;
  border: 1.5px solid var(--border2); border-radius: var(--rsm);
  font-size: 13px; font-family: inherit;
  background: var(--bg); color: var(--text); outline: none;
  transition: border-color .15s, box-shadow .15s, background .3s;
}
.todo-input:focus {
  border-color: var(--blue); background: var(--card);
  box-shadow: 0 0 0 3px rgba(37,99,235,.1);
}
.todo-add-btn {
  padding: 0 16px; height: 40px;
  border-radius: var(--rsm);
  border: none; background: var(--blue); color: #fff;
  font-size: 13px; font-weight: 600; font-family: inherit;
  cursor: pointer; transition: background .15s;
  white-space: nowrap; flex-shrink: 0;
}
.todo-add-btn:hover { background: var(--blue-dk); }
.todo-list { display: flex; flex-direction: column; gap: 4px; }
.todo-item {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 9px 12px;
  background: var(--bg); border: 1px solid var(--border);
  border-radius: 10px; transition: all .15s;
}
.todo-item:hover { border-color: var(--border2); box-shadow: 0 1px 4px rgba(0,0,0,.06); }
.todo-item.done { opacity: .65; }
.todo-item.done .todo-text { text-decoration: line-through; color: var(--text3); }
.todo-check {
  width: 18px; height: 18px; border-radius: 5px;
  border: 2px solid var(--border2); background: var(--card);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; flex-shrink: 0; transition: all .15s;
  margin-top: 1px;
}
.todo-check:hover { border-color: var(--blue); background: var(--blue-bg); }
.todo-item.done .todo-check { background: var(--green); border-color: var(--green); color: #fff; }
.todo-check-icon { font-size: 10px; line-height: 1; display: none; font-weight: 700; }
.todo-item.done .todo-check-icon { display: block; }
.todo-text { flex: 1; font-size: 13px; color: var(--text); transition: color .15s; word-break: break-all; white-space: normal; line-height: 1.55; }
.todo-del {
  background: none; border: none; color: var(--text3); cursor: pointer;
  font-size: 16px; padding: 0 2px; line-height: 1;
  opacity: 0; transition: all .12s; flex-shrink: 0; margin-top: 1px;
}
.todo-item:hover .todo-del { opacity: 1; }
.todo-del:hover { color: var(--red); }
.todo-footer {
  display: flex; align-items: center; justify-content: space-between;
  padding-top: 8px; border-top: 1px solid var(--border);
}
.todo-count { font-size: 11px; color: var(--text3); }
.todo-clear-btn {
  font-size: 11px; color: var(--text3); background: none; border: none;
  cursor: pointer; font-family: inherit; padding: 2px 6px; border-radius: 4px; transition: all .12s;
}
.todo-clear-btn:hover { color: var(--red); background: var(--red-bg); }

/* ══ BUTTONS ══ */
.btn { padding: 7px 16px; border-radius: var(--rsm); border: none; background: var(--blue); color: #fff; font-size: 12px; font-weight: 600; font-family: inherit; cursor: pointer; transition: background .15s; }
.btn:hover { background: var(--blue-dk); }
.btn-outline { padding: 7px 14px; border-radius: var(--rsm); border: 1px solid var(--border2); background: var(--card); color: var(--text2); font-size: 12px; font-family: inherit; cursor: pointer; transition: all .15s; }
.btn-outline:hover { background: var(--bg); border-color: var(--blue); color: var(--blue); }
.btn-ghost-red { padding: 7px 12px; border-radius: var(--rsm); border: 1px solid var(--border2); background: none; color: var(--red); font-size: 12px; font-family: inherit; cursor: pointer; transition: all .15s; }
.btn-ghost-red:hover { background: var(--red-bg); border-color: var(--red); }
.btn-sm { font-size: 11px; font-weight: 600; padding: 4px 11px; border-radius: var(--rsm); border: 1px solid var(--border2); background: var(--card); color: var(--text2); cursor: pointer; font-family: inherit; transition: all .15s; }
.btn-sm:hover { background: var(--blue); color: #fff; border-color: var(--blue); }

/* ══ OVERLAYS ══ */
.overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,.5);
  z-index: 400; align-items: center; justify-content: center;
  backdrop-filter: blur(4px);
}
.overlay.open { display: flex; }
.dialog {
  background: var(--card); border-radius: 16px; padding: 28px;
  width: 480px; max-width: 94vw;
  box-shadow: var(--shadow-lg); border: 1px solid var(--border);
}
.dialog h2 { font-size: 16px; font-weight: 700; margin-bottom: 6px; color: var(--text); }
.dialog p  { font-size: 13px; color: var(--text2); line-height: 1.7; margin-bottom: 18px; }
.steps { background: var(--bg); border-radius: var(--rsm); padding: 14px 18px; margin-bottom: 18px; counter-reset: s; border: 1px solid var(--border); }
.step  { font-size: 12.5px; color: var(--text2); line-height: 2; display: flex; gap: 8px; counter-increment: s; }
.step::before { content: counter(s); font-size: 10px; font-weight: 700; color: var(--blue); background: var(--blue-bg); min-width: 18px; height: 18px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-top: 5px; flex-shrink: 0; }
.step b { color: var(--text); font-weight: 600; }
.url-field { width: 100%; padding: 10px 13px; border: 1.5px solid var(--border2); border-radius: var(--rsm); font-size: 13px; font-family: 'DM Mono', monospace; color: var(--text); background: var(--bg); outline: none; margin-bottom: 16px; transition: border-color .15s, box-shadow .15s; }
.url-field:focus { border-color: var(--blue); box-shadow: 0 0 0 3px rgba(37,99,235,.12); background: var(--card); }
.dialog-btns { display: flex; gap: 8px; justify-content: flex-end; }

.mini-dialog {
  background: var(--card); border-radius: 14px; padding: 22px;
  width: 320px; max-width: 94vw;
  box-shadow: var(--shadow-lg); border: 1px solid var(--border);
  display: flex; flex-direction: column; gap: 12px;
}
.mini-dialog h3 { font-size: 14px; font-weight: 700; color: var(--text); }
.field { display: flex; flex-direction: column; gap: 4px; }
.field label { font-size: 10px; font-weight: 700; color: var(--text2); letter-spacing: .06em; text-transform: uppercase; }
.field input, .field select {
  padding: 9px 11px; border: 1.5px solid var(--border2); border-radius: var(--rsm);
  font-size: 12.5px; font-family: inherit; background: var(--bg); color: var(--text); outline: none;
  transition: border-color .15s, box-shadow .15s, background .25s;
}
.field input:focus, .field select:focus {
  border-color: var(--blue); background: var(--card);
  box-shadow: 0 0 0 3px rgba(37,99,235,.12);
}
.mini-btns { display: flex; gap: 6px; margin-top: 4px; }

/* ══ Color swatch ══ */
.color-swatch {
  padding: 5px 10px; border-radius: 7px; border: 2px solid transparent;
  font-size: 11px; font-weight: 600; cursor: pointer; font-family: inherit; transition: all .12s;
}
.color-swatch.selected { border-color: var(--blue) !important; box-shadow: 0 0 0 2px rgba(37,99,235,.25); }

/* 드래그 핸들 */
.drag-handle {
  text-align: center; font-size: 14px; color: var(--text3);
  cursor: grab; line-height: 1; padding: 1px 0;
  user-select: none;
}
.drag-handle:active { cursor: grabbing; }
.link-item.dragging { opacity: .4; }
.link-item.drag-over .link-btn {
  outline: 2px dashed var(--blue);
  outline-offset: 2px;
}

/* 시간표 overlay */
.tt-ov-title { font-size: 14px; font-weight: 700; color: var(--text); }

/* ══════════════════════════════
   DESIGN POLISH
══════════════════════════════ */

/* 헤더 하단 accent 라인 */
.hdr::after {

/* 카드 hover 효과 — transform 제거 */

<script>
/* ── 다크모드 ── */
function toggleDark(){
  const isDark = document.documentElement.classList.toggle('dark');
  document.getElementById('dark-icon').textContent = isDark ? '☀️' : '🌙';
  localStorage.setItem('dark', isDark ? '1' : '0');
}
(function(){
  const d = localStorage.getItem('dark');
  if(d === '1'){ document.documentElement.classList.add('dark'); document.addEventListener('DOMContentLoaded',()=>{ const i=document.getElementById('dark-icon'); if(i)i.textContent='☀️'; }); }
})();

/* ── 학년일정 API ── */
const SCHEDULE_API = 'https://script.google.com/macros/s/AKfycbwt88IWEiKk6PZm9Myqcy_i8qSwg6FgtdC8oHa0Q2nGlRstYaSwKz1gryJrDMmKHn-d/exec';
let scheduleMap = {}; // { 'YYYY-MM-DD': { school, g3 } }

async function loadSchedule() {
  try {
    const res  = await fetch(SCHEDULE_API);
    const data = await res.json();
    const rows = data.schedule || data;
    scheduleMap = {};
    rows.forEach(row => {
      const dateVal = row['날짜'];
      if (!dateVal) return;
      const key = String(dateVal).substring(0, 10);
      const school = (row['일정(학교)']    || '').trim();
      const g3     = (row['일정(3학년부)'] || '').trim();
      if (school || g3) scheduleMap[key] = { school, g3 };
    });
    buildCal(); // 데이터 로드 후 달력 재렌더
  } catch(e) {

function gsPost(data, cb){
  if(!cloud())return;

  fetch(GS_URL, {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify(data),
    mode: 'no-cors'
  }).then(()=>{
    setSync('synced');
    if(cb) cb({ok:true});
  }).catch(()=>setSync('error'));

/* ── 달력 ── */
function dateKey(yr,mo,d){
  return `${yr}-${String(mo+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
}
function makeDots(key){
  const ev = scheduleMap[key];
  if(!ev) return '<div class="cal-dots"></div>';
  let dots = '';
  if(ev.g3)     dots += '<span class="cal-dot g3"></span>';
  if(ev.school) dots += '<span class="cal-dot school"></span>';
  return `<div class="cal-dots">${dots}</div>`;
}
function buildCal(){
  const today=new Date(), yr=calY, mo=calM;
  document.getElementById('cal-month').textContent=`${yr}년 ${mo+1}월`;
  const fd=new Date(yr,mo,1).getDay(), ld=new Date(yr,mo+1,0).getDate(), pl=new Date(yr,mo,0).getDate();
  const DOWS=['일','월','화','수','목','금','토'];
  let h=DOWS.map(d=>`<div class="cal-dow">${d}</div>`).join('');
  // 이전달 빈칸
  for(let i=0;i<fd;i++){
    const dw=i;
    h+=`<div class="cal-day other${dw===0?' sun':dw===6?' sat':''}"><div class="cal-day-num">${pl-fd+1+i}</div><div class="cal-dots"></div></div>`;
  }
  // 이번달
  for(let d=1;d<=ld;d++){
    const dw=(fd+d-1)%7;
    const isT=yr===today.getFullYear()&&mo===today.getMonth()&&d===today.getDate();
    const cls=['cal-day',isT?'today':'',dw===0?'sun':dw===6?'sat':''].filter(Boolean).join(' ');
    const key=dateKey(yr,mo,d);
    const hasEv = !!scheduleMap[key];
    const clickHandler = hasEv ? `onclick="window.open('https://chemistry12.github.io/0101/','_blank')"` : '';
    const cursorStyle = hasEv ? 'style="cursor:pointer"' : '';
    h+=`<div class="${cls}" data-key="${key}" ${cursorStyle} ${clickHandler} onmouseenter="showCalTip(this,event)" onmouseleave="hideCalTip()"><div class="cal-day-num">${d}</div>${makeDots(key)}</div>`;
  }
  // 다음달 빈칸
  const rem=42-fd-ld;
  for(let i=1;i<=rem;i++){
    const dw=(fd+ld-1+i)%7;
    h+=`<div class="cal-day other${dw===0?' sun':dw===6?' sat':''}"><div class="cal-day-num">${i}</div><div class="cal-dots"></div></div>`;
  }
  document.getElementById('cal-grid').innerHTML=h;
  requestAnimationFrame(syncTTHeight);
}

/* ── 달력 툴팁 ── */
let _tipEl = null;
function showCalTip(cell, e){
  const key = cell.dataset.key;
  if(!key) return;
  const ev = scheduleMap[key];
  if(!ev) return;
  hideCalTip();
  const [yr,mo,d] = key.split('-');
  const DOW=['일','월','화','수','목','금','토'][new Date(key).getDay()];
  let inner = `<div class="cal-tooltip-date">${parseInt(mo)}월 ${parseInt(d)}일 (${DOW})</div>`;
  if(ev.g3)     inner += `<div class="cal-tooltip-row cal-tooltip-g3"><span class="cal-tooltip-dot"></span><span class="cal-tooltip-txt">${ev.g3}</span></div>`;
  if(ev.school) inner += `<div class="cal-tooltip-row cal-tooltip-sch"><span class="cal-tooltip-dot"></span><span class="cal-tooltip-txt">${ev.school}</span></div>`;
  const tip = document.createElement('div');
  tip.className = 'cal-tooltip';
  tip.innerHTML = inner;
  // 위치: 셀 아래에 표시, 카드 기준
  const card = document.getElementById('cal-card');
  const cardRect = card.getBoundingClientRect();
  const cellRect = cell.getBoundingClientRect();
  let left = cellRect.left - cardRect.left - 8;
  let top  = cellRect.bottom - cardRect.top + 4;
  card.appendChild(tip);
  // 오른쪽 벗어남 방지
  const tw = tip.offsetWidth;
  if(left + tw > card.offsetWidth - 8) left = card.offsetWidth - tw - 8;
  if(left < 4) left = 4;
  tip.style.left = left + 'px';
  tip.style.top  = top  + 'px';
  _tipEl = tip;
}
function hideCalTip(){
  if(_tipEl){ _tipEl.remove(); _tipEl=null; }
}
function moveMonth(d){
  if(d===0){const t=new Date();calY=t.getFullYear();calM=t.getMonth();}
  else{calM+=d;if(calM>11){calM=0;calY++;}if(calM<0){calM=11;calY--;}}
  buildCal();
}
function syncTTHeight(){
  // 높이 고정 제거 — 시간표는 자연 높이로
  ['tt-card-0','tt-card-1'].forEach(id=>{

/* ── 시간표 ── */
function merged(idx){
  const m={};
  Object.keys(TT_PRESET[idx]).forEach(k=>m[k]={...TT_PRESET[idx][k]});
  Object.keys(userTT[idx]).forEach(k=>{
    if(userTT[idx][k]===null)delete m[k];
    else m[k]={...(m[k]||{}),...userTT[idx][k]};
  });
  return m;
}
function buildTT(idx){
  const now=new Date(), ti=now.getDay()-1, tt=merged(idx);
  const curH=now.getHours(), curM=now.getMinutes(), curTotal=curH*60+curM;
  // 교시별 시작/종료 (45분 수업)
  const periodTimes=[
    {n:1,start:8*60+40,end:9*60+25},
    {n:2,start:9*60+40,end:10*60+25},
    {n:3,start:10*60+40,end:11*60+25},
    {n:4,start:12*60+30,end:13*60+15},
    {n:5,start:13*60+30,end:14*60+15},
    {n:6,start:14*60+30,end:15*60+15},
    {n:7,start:15*60+30,end:16*60+15},
  ];
  const nowPeriod = (ti>=0&&ti<5) ? (periodTimes.find(p=>curTotal>=p.start&&curTotal<p.end)||null) : null;

  document.getElementById(`tt-head-${idx}`).innerHTML=
    '<tr><th style="width:32px">교시</th>'+
    DAYS.map((d,i)=>`<th class="${i===ti?'th-today':''}">${d}</th>`).join('')+'</tr>';
  const body=document.getElementById(`tt-body-${idx}`);
  body.innerHTML='';
  PERIODS.forEach(({n})=>{
    const tr=document.createElement('tr');
    if(nowPeriod && nowPeriod.n===n) tr.classList.add('tt-row-now');
    tr.innerHTML=`<td class="p-col">${n}</td>`;
    DAYS.forEach((d,di)=>{
      const key=`${d}-${n}`, cell=tt[key], td=document.createElement('td');
      if(di===ti)td.classList.add('t-col');
      if(cell){
        const c=COLORS[cell.color]||COLORS.yellow;
        td.innerHTML=`<div class="tt-cell" style="background:${c.bg};color:${c.text}" onclick="openTTEdit(${idx},'${d}',${n})">
          <span class="tt-cell-name" style="color:${c.text}">${cell.subject}</span>
          ${cell.sub?`<span class="tt-cell-sub" style="color:${c.text}">${cell.sub}</span>`:''}
        </div>`;
      }else{
        td.innerHTML=`<div class="tt-cell empty" onclick="openTTEdit(${idx},'${d}',${n})"></div>`;
      }
      tr.appendChild(td);
    });
    body.appendChild(tr);
  });
}
function openTTEdit(idx,day,period){
  ttTarget={idx,day,period};
  const cell=merged(idx)[`${day}-${period}`]||{};
  document.getElementById('tt-ov-title').textContent=`${idx===0?'화학Ⅱ 반':'실험 반'} · ${day}요일 ${period}교시`;
  document.getElementById('tt-subj').value=cell.subject||'';
  document.getElementById('tt-color').value=cell.color||'yellow';
  document.getElementById('tt-room').value=cell.sub||'';
  document.getElementById('tt-del-btn').style.visibility=cell.subject?'visible':'hidden';
  openOv('tt-ov');
  setTimeout(()=>document.getElementById('tt-subj').focus(),80);
}
function saveTT(){
  if(!ttTarget)return;
  const key=`${ttTarget.day}-${ttTarget.period}`;
  const subj=document.getElementById('tt-subj').value.trim();
  userTT[ttTarget.idx][key]=subj

  closeOv('tt-ov'); buildTT(ttTarget.idx);

/* ── 드래그 앤 드롭 ── */
let dragSrcType = null, dragSrcIdx = null;

function dragStart(e){
  const el = e.currentTarget;
  dragSrcType = el.dataset.type;
  dragSrcIdx  = parseInt(el.dataset.idx);
  e.dataTransfer.effectAllowed = 'move';
  el.classList.add('dragging');
}
function dragOver(e){
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  const el = e.currentTarget;
  if(el.dataset.idx !== undefined) el.classList.add('drag-over');
}
function dragDrop(e){
  e.preventDefault();
  const target = e.currentTarget;
  const toIdx = parseInt(target.dataset.idx);
  if(dragSrcType && dragSrcIdx !== null && dragSrcIdx !== toIdx && dragSrcType === target.dataset.type){
    const list = getList(dragSrcType);
    const [moved] = list.splice(dragSrcIdx, 1);
    list.splice(toIdx, 0, moved);
    saveLinks(dragSrcType);
    renderLinks(dragSrcType);
  }
  document.querySelectorAll('.drag-over').forEach(el=>el.classList.remove('drag-over'));
}
function dragEnd(e){
  e.currentTarget.classList.remove('dragging');
  document.querySelectorAll('.drag-over').forEach(el=>el.classList.remove('drag-over'));
  dragSrcType = null; dragSrcIdx = null;
}

function quickDelLink(type,idx){
  getList(type).splice(idx,1);
  saveLinks(type); renderLinks(type);
}
function openURL(enc){window.open(decodeURIComponent(enc),'_blank','noopener');}

/* ── 할일 목록 ── */
function addTodo(){
  const input=document.getElementById('todo-input');
  const dueInput=document.getElementById('todo-due-input');
  const text=input.value.trim();
  if(!text)return;
  todos.push({text, done:false, id:Date.now(), due: dueInput.value||null});
  input.value=''; dueInput.value='';
  saveTodos(); renderTodos();
}
function toggleTodo(id){
  const t=todos.find(x=>x.id===id);
  if(t)t.done=!t.done;
  saveTodos(); renderTodos();
}
function delTodo(id){
  todos=todos.filter(x=>x.id!==id);
  saveTodos(); renderTodos();
}
function startEditTodo(id){
  const t=todos.find(x=>x.id===id);
  if(!t)return;
  const el=document.getElementById(`todo-text-${id}`);
  if(!el)return;
  const inp=document.createElement('input');
  inp.className='todo-text-edit';
  inp.value=t.text;
  el.replaceWith(inp);
  inp.focus(); inp.select();
  const finish=()=>{
    const v=inp.value.trim();
    if(v){ t.text=v; saveTodos(); }
    renderTodos();
  };
  inp.addEventListener('blur', finish);
  inp.addEventListener('keydown', e=>{ if(e.key==='Enter')inp.blur(); if(e.key==='Escape'){renderTodos();} });
}
function clearDoneTodos(){
  todos=todos.filter(x=>!x.done);
  saveTodos(); renderTodos();
}
function saveTodos(){
  lsave('todos',todos);
  syncData('todos',todos);
}
function getDueLabel(due){
  if(!due) return null;
  const today=new Date(); today.setHours(0,0,0,0);
  const d=new Date(due); d.setHours(0,0,0,0);
  const diff=Math.round((d-today)/(1000*60*60*24));
  if(diff<0)  return {cls:'due-over', txt:`D+${Math.abs(diff)}`};
  if(diff===0)return {cls:'due-soon', txt:'D-Day'};
  if(diff<=3) return {cls:'due-soon', txt:`D-${diff}`};
  return {cls:'due-ok', txt:`D-${diff}`};
}
function renderTodos(){
  const el=document.getElementById('todo-list');
  const cnt=document.getElementById('todo-count');
  if(!todos.length){el.innerHTML='<div class="empty-msg">할 일이 없습니다</div>';cnt.textContent='항목 없음';return;}
  const done=todos.filter(x=>x.done).length;
  cnt.textContent=`${done}/${todos.length} 완료`;
  const sorted=[...todos.filter(x=>!x.done),...todos.filter(x=>x.done)];
  el.innerHTML=sorted.map(t=>{
    const due=getDueLabel(t.due);
    return `
    <div class="todo-item${t.done?' done':''}" id="todo-${t.id}">
      <div class="todo-check" onclick="toggleTodo(${t.id})">
        <span class="todo-check-icon">✓</span>
      </div>
      <span class="todo-text" id="todo-text-${t.id}">${escapeHtml(t.text)}</span>
      ${due?`<span class="todo-due ${due.cls}">${due.txt}</span>`:''}
      <div class="todo-actions">
        <button class="todo-edit-btn" onclick="startEditTodo(${t.id})" title="수정">✏️</button>
        <button class="todo-del" onclick="delTodo(${t.id})">×</button>
      </div>
    </div>`;
  }).join('');
}
function escapeHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

/* ── 전체 렌더 ── */
function renderAll(){
  renderLinks('cls'); renderLinks('adm'); renderLinks('cls2');
  renderTodos(); buildCal(); buildTT(0); buildTT(1);
}

function init(){
  const now=new Date(); calY=now.getFullYear(); calM=now.getMonth();
  clsLinks = lload('cls_links',[]);
  admLinks = lload('adm_links',[]);
  cls2Links= lload('cls2_links',[]);

  window.addEventListener('resize',syncTTHeight);

  setInterval(()=>{ buildTT(0); buildTT(1); }, 60000);
  // 학년일정 로드 (달력 이벤트 표시)
  loadSchedule();
}
init();
